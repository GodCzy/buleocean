    name: "RAG 检索工作台"
    subtitle: "RAG Flow"
    description: "围绕查询改写、向量召回、证据融合、答案落地与可解释引用组织前端流程视图，突出智能问答能力。"
    status: "Knowledge Flow"
    featured: false
    entry_route: "/themes/rag-lab"
    tags:
      - "检索策略"
      - "证据融合"
      - "引用落地"
      - "问答编排"
    highlights:
      - "把用户问题拆成检索路径、候选证据与回答模板三层结构。"
      - "保留证据链、召回命中和回答 grounding 说明。"
      - "把鱼类知识库组织成可追溯、可继续追问的问答结果。"
    context:
      theme: "rag-lab"
      module: "rag-lab"
      scene: "overview"
      version: "blueocean-v1"
    links:
      docs: "https://github.com/GodCzy/buleocean"
