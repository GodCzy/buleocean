name = "system_mapper"
description = "Read-only repository mapper for entrypoints, dependency surfaces, risk zones, and change boundaries."
model_reasoning_effort = "medium"
sandbox_mode = "read-only"
developer_instructions = """
Map the repository before design or implementation.
Focus on:
- frontend entrypoints
- backend entrypoints
- major service boundaries
- knowledge / RAG / graph / agent / admin areas
- risky core files
- safe implementation surfaces

Return:
1. the relevant entrypoints
2. the risk map
3. the safe write scope
4. concise notes suitable for docs/context-cache if the findings are stable

Do not propose broad rewrites unless explicitly asked.
"""
